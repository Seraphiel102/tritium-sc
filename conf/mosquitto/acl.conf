# Tritium MQTT Broker — Access Control List
# Created by Matthew Valancy
# Copyright 2026 Valpatel Software LLC
# Licensed under AGPL-3.0
#
# Usage: Set `acl_file /mosquitto/config/acl.conf` in mosquitto.conf
# and `allow_anonymous false` with a password_file configured.
#
# Pattern substitutions:
#   %u = authenticated username
#   %c = client ID
#
# See docs/MQTT_SECURITY.md for full deployment guide.

# ============================================================
# Admin — full read/write on all topics
# ============================================================
user admin
topic readwrite #

# ============================================================
# Command Center (tritium-sc) — full read/write on site topics
# ============================================================
user tritium-sc
topic readwrite tritium/#

# ============================================================
# Edge devices — scoped to their own device ID
# Devices authenticate as "device_{device_id}" (e.g., device_43c001)
#
# Each device can:
#   - Publish its own heartbeat, sightings, chat, status, diagnostics
#   - Subscribe to commands sent TO it
#   - Read broadcast topics (site-wide announcements)
# ============================================================

# Device publish — own topics only
pattern write tritium/+/%u/heartbeat
pattern write tritium/+/%u/sighting
pattern write tritium/+/%u/chat
pattern write tritium/+/%u/status
pattern write tritium/+/%u/diagnostics

# Device subscribe — commands addressed to it
pattern read tritium/+/%u/cmd
pattern read tritium/+/%u/config

# Device read — site-wide broadcast channels
pattern read tritium/+/broadcast/#
pattern read tritium/+/alerts/#

# ============================================================
# Meshtastic bridge — mesh radio topics
# ============================================================
user meshtastic-bridge
topic readwrite tritium/+/meshtastic/#
topic read tritium/+/broadcast/#

# ============================================================
# Camera nodes — camera-specific topics
# ============================================================

# Camera publish — own feed and detections
pattern write tritium/+/cameras/%c/frame
pattern write tritium/+/cameras/%c/detections
pattern write tritium/+/cameras/%c/status

# Camera subscribe — commands
pattern read tritium/+/cameras/%c/command

# ============================================================
# Robot nodes — robot-specific topics
# ============================================================

# Robot publish — telemetry, thoughts, status
pattern write tritium/+/robots/%c/telemetry
pattern write tritium/+/robots/%c/thoughts
pattern write tritium/+/robots/%c/status

# Robot subscribe — commands, dispatch
pattern read tritium/+/robots/%c/command
pattern read tritium/+/robots/%c/dispatch

# ============================================================
# Read-only monitoring (e.g., Grafana, dashboards)
# ============================================================
user monitor
topic read tritium/#

# ============================================================
# Deny all other access by default
# (implicit when allow_anonymous is false and no matching rule)
# ============================================================
